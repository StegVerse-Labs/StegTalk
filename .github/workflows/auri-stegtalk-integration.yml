name: Auri StegTalk Integration Verification

on:
  push:
    paths:
      - 'src/stegtalk/auri/**'
      - 'auri/schemas/session-binding-receipt.schema.json'
      - 'scripts/verify_auri_stegtalk_session_binding.py'
      - '.github/workflows/auri-stegtalk-integration.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify activation-gated session binding
        run: python scripts/verify_auri_stegtalk_session_binding.py
