name: Auri Live Proof

on:
  workflow_dispatch:
  repository_dispatch:
    types: [auri_deployment_ready]

permissions:
  contents: write

concurrency:
  group: auri-live-proof
  cancel-in-progress: false

jobs:
  live-proof:
    if: ${{ vars.AURI_LIVE_BASE_URL != '' && vars.AURI_PROVIDER_BINDING_PATH != '' && vars.AURI_DEPLOYMENT_AUTHORIZATION_PATH != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify authorized provider and deployment inputs
        run: |
          mkdir -p evidence
          python scripts/verify_auri_activation_inputs.py \
            --provider-binding "${{ vars.AURI_PROVIDER_BINDING_PATH }}" \
            --deployment-authorization "${{ vars.AURI_DEPLOYMENT_AUTHORIZATION_PATH }}" \
            --output evidence/auri-activation-inputs.json
      - name: Probe live service
        run: |
          python scripts/probe_auri_live_service.py "${{ vars.AURI_LIVE_BASE_URL }}" \
            --output evidence/auri-live-health.json
      - name: Verify required cross-repository evidence references
        env:
          PROVIDER_BINDING_REF: ${{ vars.AURI_PROVIDER_BINDING_REF }}
          STEGCORE_EVIDENCE_REF: ${{ vars.AURI_STEGCORE_EVIDENCE_REF }}
          CONTINUITY_EVIDENCE_REF: ${{ vars.AURI_CONTINUITY_EVIDENCE_REF }}
        run: |
          python - <<'PY'
          import os
          missing = [name for name in (
              "PROVIDER_BINDING_REF",
              "STEGCORE_EVIDENCE_REF",
              "CONTINUITY_EVIDENCE_REF",
          ) if not os.environ.get(name, "").strip()]
          if missing:
              raise SystemExit("missing activation evidence variables: " + ", ".join(missing))
          PY
      - name: Build activation receipt
        env:
          AURI_LIVE_BASE_URL: ${{ vars.AURI_LIVE_BASE_URL }}
          PROVIDER_BINDING_REF: ${{ vars.AURI_PROVIDER_BINDING_REF }}
          STEGCORE_EVIDENCE_REF: ${{ vars.AURI_STEGCORE_EVIDENCE_REF }}
          CONTINUITY_EVIDENCE_REF: ${{ vars.AURI_CONTINUITY_EVIDENCE_REF }}
        run: |
          python scripts/build_auri_activation_receipt.py \
            --deployment-target-ref "$AURI_LIVE_BASE_URL" \
            --service-health-ref evidence/auri-live-health.json \
            --provider-binding-ref "$PROVIDER_BINDING_REF" \
            --stegcore-decision-evidence-ref "$STEGCORE_EVIDENCE_REF" \
            --continuity-receipt-chain-ref "$CONTINUITY_EVIDENCE_REF" \
            --containment-test-ref evidence/auri-containment-verification.json \
            --revocation-test-ref evidence/auri-containment-verification.json \
            --output evidence/auri-activation-receipt.json
      - name: Finalize candidate activation state
        run: |
          python scripts/finalize_auri_activation_state.py \
            --state auri/activation-state.json \
            --activation-inputs evidence/auri-activation-inputs.json \
            --live-health evidence/auri-live-health.json \
            --activation-receipt evidence/auri-activation-receipt.json \
            --output evidence/auri-activation-state.final.json
      - name: Upload activation evidence
        uses: actions/upload-artifact@v4
        with:
          name: auri-live-proof
          path: |
            evidence/auri-activation-inputs.json
            evidence/auri-live-health.json
            evidence/auri-activation-receipt.json
            evidence/auri-activation-state.final.json
      - name: Commit verified activation evidence and state
        run: |
          cp evidence/auri-activation-state.final.json auri/activation-state.json
          git config user.name "stegverse-automation"
          git config user.email "actions@users.noreply.github.com"
          git add auri/activation-state.json evidence/auri-activation-inputs.json evidence/auri-live-health.json evidence/auri-activation-receipt.json
          if git diff --cached --quiet; then
            echo "No activation state change to commit"
          else
            git commit -m "Activate AURI-L1 from verified live evidence"
            git push
          fi
