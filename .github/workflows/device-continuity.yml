name: device-continuity

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-device-continuity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate handoff payload
        run: python tools/validate_device_continuity_handoff.py

      - name: Validate destination receipt
        run: python tools/validate_device_continuity_receipt.py

      - name: Run Device Continuity tests
        run: python -m pytest tests/test_device_continuity_handoff.py tests/test_device_continuity_receipt.py
