name: StegTalk Managed Completion

on:
  push:
  pull_request:

jobs:
  managed-completion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test/runtime support
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Verify managed completion state
        run: python scripts/verify_managed_completion.py
      - name: Determine next managed task
        run: python scripts/managed_next_task.py
      - name: Summarize queue execution state
        run: python scripts/queue_status.py
      - name: Run managed completion tests
        run: python -m pytest tests/test_managed_completion.py tests/test_queue_executor.py
      - name: Run entity runtime tests
        run: python -m pytest tests/test_entity_runtime.py tests/test_entity_interactions.py tests/test_entity_runtime_demo.py
      - name: Run entity runtime demo
        run: python scripts/run_entity_runtime_demo.py
      - name: Run message envelope tests
        run: python -m pytest tests/test_message_envelope.py
      - name: Run message envelope demo
        run: python scripts/run_message_envelope_demo.py
