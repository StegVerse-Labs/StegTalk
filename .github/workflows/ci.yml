name: StegTalk Managed Completion

on:
  push:
  pull_request:

jobs:
  managed-completion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test/runtime support
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Verify managed completion state
        run: python scripts/verify_managed_completion.py
      - name: Determine next managed task
        run: python scripts/managed_next_task.py
      - name: Summarize queue execution state
        run: python scripts/queue_status.py
      - name: Run managed completion tests
        run: python -m pytest tests/test_managed_completion.py tests/test_queue_executor.py
      - name: Run entity runtime tests
        run: python -m pytest tests/test_entity_runtime.py tests/test_entity_interactions.py tests/test_entity_runtime_demo.py
      - name: Run messaging runtime tests
        run: python -m pytest tests/test_message_envelope.py tests/test_contact_routing.py
      - name: Run local-state runtime tests
        run: python -m pytest tests/test_local_inbox.py tests/test_local_store.py tests/test_activation_readiness.py tests/test_boundary.py tests/test_mobile_shell.py
      - name: Validate mobile session round trip
        run: python -m pytest -vv tests/test_mobile_shell_session.py::test_mobile_shell_session_round_trip
      - name: Validate mobile session inspection
        run: python -m pytest -vv tests/test_mobile_shell_session.py::test_mobile_shell_session_inspection_reports_projection_counts
      - name: Validate mobile session authority rejection
        run: python -m pytest -vv tests/test_mobile_shell_session.py::test_mobile_shell_session_rejects_authority_escalation
      - name: Validate mobile session tamper rejection
        run: python -m pytest -vv tests/test_mobile_shell_session.py::test_mobile_shell_session_detects_snapshot_tampering
      - name: Validate mobile session receipt chain
        run: python -m pytest -vv tests/test_mobile_shell_session_receipts.py tests/test_mobile_shell_session_receipt_state.py
      - name: Run unattended session receipt verifier
        run: python scripts/verify_mobile_shell_session_receipts.py
      - name: Run release artifact tests
        run: python -m pytest tests/test_local_prototype_review.py tests/test_release_status.py tests/test_release_handoff.py tests/test_next_build_lane.py tests/test_candidate_status.py tests/test_local_candidate.py
      - name: Run mirror handoff test
        run: python -m pytest -vv tests/test_mirror_handoff.py
      - name: Run discovery and shell tests
        run: python -m pytest tests/test_public_discovery.py tests/test_discovery_index.py tests/test_discovery_demo.py tests/test_shell_state.py tests/test_shell_actions.py tests/test_shell_demo.py tests/test_shell_review.py
      - name: Run account and wiki tests
        run: python -m pytest tests/test_account_model.py tests/test_account_session.py tests/test_wiki_staging_install.py tests/test_wiki_target_blocker.py
      - name: Run runtime demos
        run: python scripts/run_entity_runtime_demo.py && python scripts/run_message_envelope_demo.py && python scripts/run_contact_routing_demo.py && python scripts/run_local_inbox_demo.py && python scripts/run_local_store_demo.py && python scripts/verify_activation_readiness.py
