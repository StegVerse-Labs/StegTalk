name: StegTalk Managed Completion

on:
  push:
  pull_request:

jobs:
  managed-completion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify managed completion state
        run: python scripts/verify_managed_completion.py
