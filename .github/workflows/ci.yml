name: StegTalk Managed Completion

on:
  push:
  pull_request:

jobs:
  managed-completion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test/runtime support
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Verify managed completion state
        run: python scripts/verify_managed_completion.py
      - name: Determine next managed task
        run: python scripts/managed_next_task.py
      - name: Summarize queue execution state
        run: python scripts/queue_status.py
      - name: Run managed completion tests
        run: python -m pytest tests/test_managed_completion.py tests/test_queue_executor.py
      - name: Run runtime tests
        run: python -m pytest tests/test_entity_runtime.py tests/test_entity_interactions.py tests/test_entity_runtime_demo.py tests/test_message_envelope.py tests/test_contact_routing.py tests/test_local_inbox.py tests/test_local_store.py tests/test_activation_readiness.py tests/test_boundary.py
      - name: Run runtime demos
        run: python scripts/run_entity_runtime_demo.py && python scripts/run_message_envelope_demo.py && python scripts/run_contact_routing_demo.py && python scripts/run_local_inbox_demo.py && python scripts/run_local_store_demo.py && python scripts/verify_activation_readiness.py
